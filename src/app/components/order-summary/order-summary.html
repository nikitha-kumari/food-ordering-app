<div class="container mt-3">

<h4>Order Summary</h4>

<div class="card p-2 mb-2" *ngFor="let item of cartService.getItems()">

<div class="d-flex justify-content-between">

<div>
<h6>{{item.food}}</h6>
<p>{{item.restaurant}}</p>
</div>

<div>
₹{{item.price}} × {{item.quantity}}
</div>

</div>

</div>

<div class="card p-3 mt-3">

<h5>Total: ₹{{cartService.getTotal()}}</h5>

<button class="btn btn-success w-100" routerLink="/address">
Proceed to Payment
</button>
</div>

</div>
