<div class="container mt-4 payment-container">

<h4 class="mb-4">Select Payment Method</h4>

<div class="card p-4 shadow-sm">

<!-- Cash on Delivery -->
<div class="form-check payment-option">
<input class="form-check-input"
       type="radio"
       name="payment"
       value="cod"
       [(ngModel)]="paymentMethod">

<label class="form-check-label">
💵 Cash on Delivery
</label>
<div *ngIf="paymentMethod === 'cod'" class="mt-2 text-muted">
Pay the delivery person when your order arrives.
</div>
</div>

<hr>

<!-- UPI -->
<div class="form-check payment-option">
<input class="form-check-input"
       type="radio"
       name="payment"
       value="upi"
       [(ngModel)]="paymentMethod">

<label class="form-check-label">
📱 UPI (Google Pay / PhonePe / Paytm)
</label>
<div *ngIf="paymentMethod === 'upi'" class="mt-2">

<input
class="form-control"
placeholder="Enter UPI ID (example@upi)"
[(ngModel)]="upiId">

</div>
</div>


<hr>

<!-- Card -->
<div class="form-check payment-option">
<input class="form-check-input"
       type="radio"
       name="payment"
       value="card"
       [(ngModel)]="paymentMethod">

<label class="form-check-label">
💳 Credit / Debit Card
</label>
</div>

<!-- Card Fields -->
<div *ngIf="paymentMethod === 'card'" class="mt-3">

<input class="form-control mb-2"
placeholder="Card Number">

<div class="row">

<div class="col">
<input class="form-control"
placeholder="MM/YY">
</div>

<div class="col">
<input class="form-control"
placeholder="CVV">
</div>

</div>

</div>

<button
class="btn btn-success w-100 mt-4" routerLink="/order-success"
(click)="placeOrder()">
Place Order
</button>
</div>
</div>
